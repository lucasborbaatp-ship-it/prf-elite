
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRF Elite</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>🚔 PRF Elite</h1>

<div class="card">
<h2>📊 Desempenho</h2>
<label>Questões</label>
<input type="number" id="questoes">

<label>Acertos</label>
<input type="number" id="acertos">

<label>Erros</label>
<input type="number" id="erros">

<button onclick="registrar()">Registrar</button>

<canvas id="grafico"></canvas>

</div>


<div class="card">
<h2>📚 Controle de Tópicos</h2>

<label><input type="checkbox" class="topico"> Interpretação de texto</label><br>
<label><input type="checkbox" class="topico"> Pontuação</label><br>
<label><input type="checkbox" class="topico"> Artigo 5º CF</label><br>
<label><input type="checkbox" class="topico"> Crimes de trânsito</label><br>
<label><input type="checkbox" class="topico"> Teoria do crime</label><br>
<label><input type="checkbox" class="topico"> Atos administrativos</label><br>

</div>


<div class="card">
<h2>🧠 Flashcards</h2>

<textarea id="flashcard" placeholder="Escreva aqui seus resumos ou flashcards..."></textarea>

<button onclick="salvarFlash()">Salvar</button>

</div>


<script src="app.js"></script>

</body>
</html>
