
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto PRF Elite</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>
<body>

<h1>🚔 Projeto PRF Elite</h1>

<div class="card">
<h2>📊 Dashboard</h2>
<p>Média geral: <span id="media">0%</span></p>
<p>Nota estimada (120): <span id="nota">0</span></p>
</div>

<div class="card">
<h2>📚 Registrar Estudo</h2>

<label>Disciplina</label>
<select id="disciplina">
<option>Legislação de Trânsito</option>
<option>Direito Constitucional</option>
<option>Direito Penal</option>
<option>Processo Penal</option>
<option>Português</option>
<option>RLM</option>
</select>

<label>Questões</label>
<input type="number" id="questoes">

<label>Acertos</label>
<input type="number" id="acertos">

<label>Erros</label>
<input type="number" id="erros">

<button onclick="registrar()">Registrar</button>

<p id="resultado"></p>

</div>

<div class="card">
<h2>🏃 TAF</h2>

<label>Corrida 12min (metros)</label>
<input type="number" id="corrida">

<label>Barra</label>
<input type="number" id="barra">

<button onclick="taf()">Avaliar</button>

<p id="tafResultado"></p>

</div>

<script src="app.js"></script>

</body>
</html>
