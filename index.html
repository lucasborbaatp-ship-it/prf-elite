
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRF Elite</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>🚔 PRF Elite</h1>

<div class="container">

<div class="panel">

<h2>📊 Desempenho</h2>

<input id="q" type="number" placeholder="Questões">
<input id="a" type="number" placeholder="Acertos">
<input id="e" type="number" placeholder="Erros">

<button onclick="registrar()">Registrar sessão</button>

<canvas id="grafico"></canvas>

</div>


<div class="panel">

<h2>📚 Matérias e tópicos</h2>

<select id="materia"></select>

<div id="topicos"></div>

</div>


<div class="panel">

<h2>🧠 Flashcards</h2>

<select id="flashMateria"></select>

<textarea id="flashText" placeholder="Escreva seu resumo..."></textarea>

<button onclick="salvarFlash()">Salvar</button>

</div>

</div>

<script src="subjects.js"></script>
<script src="app.js"></script>

</body>
</html>
